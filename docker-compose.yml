services:
  omniparser:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
      - huggingface-cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python src/main.py
    environment:
      # ── Thread limits for PyTorch/BLAS ──
      # Prevent each small matrix operation from spawning one thread per CPU core,
      # which causes extreme contention and cache thrashing on multi-core machines.
      # Capped at 4 to match TORCH_INTRAOP_THREADS below.
      - OMP_NUM_THREADS=6        # OpenMP threading (used by many BLAS backends)
      - MKL_NUM_THREADS=6        # Intel Math Kernel Library
      - OPENBLAS_NUM_THREADS=6   # OpenBLAS linear algebra
      # ── PyTorch thread limits (read by parser.py) ──
      - TORCH_INTRAOP_THREADS=6   # Parallelism within individual PyTorch ops
      - TORCH_INTEROP_THREADS=6   # Parallelism across independent PyTorch ops
      # VECLIB_MAXIMUM_THREADS removed — Apple Accelerate only, inert on Linux
      - NUMEXPR_NUM_THREADS=6    # NumExpr parallel evaluation
      # ── Inference device (cpu | cuda | mps) ──
      - OMNIPARSER_DEVICE=cpu
      # ── Florence inference tuning ──
      - FLORENCE_BATCH_SIZE=2           # Sub-batch size for captioning (1=no batching; 4-8 for faster)
      - FLORENCE_MAX_TOKENS_CAPTION=10  # Max tokens for element captions
      - FLORENCE_MAX_TOKENS_OCR=300     # Max tokens for OCR (tiled regions need more)
      # ── Labelling Engine Configuration ──
      - LABELLING_ENGINE=ollama         # Options: 'florence' (default) or 'ollama'
      - OLLAMA_BASE_URL=http://host.docker.internal:11435
      - OLLAMA_MODEL=qwen3-vl:4b-instruct-q4_K_M
      - OLLAMA_MAX_WORKERS=6            # Max concurrent HTTP requests to Ollama
      # ── OCR Engine Configuration ──
      - OCR_ENGINE=ollama               # Options: 'florence' (default) or 'ollama'
      # ── OCR tiling parameters (splits large regions into Florence-native chunks) ──
      - OCR_TILE_SIZE=768              # Tile dimension in pixels (matches Florence input size)
      - OCR_TILE_OVERLAP=64            # Pixel overlap between adjacent tiles to avoid boundary cuts
  browser-env:
    build:
      context: .
      dockerfile: docker/Dockerfile.browser
    volumes:
      - ./poc:/app/poc
    environment:
      - MOBILE_MODE=1
    working_dir: /app
    tty: true
    stdin_open: true
    command: python /app/poc/serve_browser.py
    # ── CPU limits for headless Chrome ──
    # Prevent headless Chromium from hogging all cores during idle periods
    # (it can spin on event-loop timers even with no pages loaded).
    deploy:
      resources:
        limits:
          cpus: '1.0'       # Hard cap at 1 full CPU core

volumes:
  huggingface-cache:
