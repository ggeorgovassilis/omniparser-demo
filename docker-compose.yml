services:
  omniparser:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: python src/main.py

  browser-env:
    build:
      context: .
      dockerfile: docker/Dockerfile.browser
    volumes:
      - ./poc:/app/poc
    working_dir: /app
    tty: true
    stdin_open: true
    command: tail -f /dev/null
